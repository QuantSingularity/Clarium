version: "3.9"

# ─── Clarium - RegTech Compliance Module ──────────────────────────────────────

networks:
  clarium-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: clarium-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clarium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clarium_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clarium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - clarium-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clarium"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting + caching) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clarium-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - clarium-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Clarium API (FastAPI backend) ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarium-api
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
      - ./rules:/app/rules
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clarium-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Webhook worker (background delivery) ──────────────────────────────────────
  webhook-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clarium-webhook-worker
    env_file: .env
    command: python -m src.workers.webhook_worker
    volumes:
      - ./rules:/app/rules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clarium-net
    restart: unless-stopped

  # ── React Admin Dashboard ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clarium-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - clarium-net
    restart: unless-stopped
